<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Shipt Order Lookup</title>
  <style>
    :root {
      --green: #00a651; --green-dark: #007a3d; --green-light: #e6f7ee;
      --gray-bg: #f5f5f5; --gray-border: #ddd;
      --text: #1a1a1a; --text-muted: #666;
      --card-bg: #fff; --radius: 14px; --shadow: 0 2px 12px rgba(0,0,0,0.10);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--gray-bg); color: var(--text);
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; padding: 24px 16px 40px;
    }
    header { width: 100%; max-width: 480px; display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
    .logo { width: 44px; height: 44px; background: var(--green); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
    header h1 { font-size: 20px; font-weight: 700; line-height: 1.2; }
    header p { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
    .search-card { background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; width: 100%; max-width: 480px; margin-bottom: 20px; }
    .input-row { display: flex; gap: 10px; }
    #orderInput { flex: 1; font-size: 18px; font-weight: 600; padding: 14px 16px; border: 2px solid var(--gray-border); border-radius: 10px; outline: none; transition: border-color 0.15s; background: var(--gray-bg); -webkit-appearance: none; }
    #orderInput:focus { border-color: var(--green); background: #fff; }
    #orderInput::placeholder { color: #aaa; font-weight: 400; font-size: 16px; }
    #lookupBtn { background: var(--green); color: #fff; border: none; border-radius: 10px; padding: 14px 20px; font-size: 16px; font-weight: 700; cursor: pointer; transition: background 0.15s, transform 0.08s; -webkit-tap-highlight-color: transparent; touch-action: manipulation; white-space: nowrap; }
    #lookupBtn:active { background: var(--green-dark); transform: scale(0.97); }
    #status { margin-top: 14px; font-size: 14px; color: var(--text-muted); min-height: 20px; text-align: center; }
    #status.error { color: #c0392b; }
    .result-card { background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; width: 100%; max-width: 480px; display: none; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .result-card.visible { display: block; }
    .order-id-label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 4px; }
    .order-id-value { font-size: 22px; font-weight: 800; color: var(--green); margin-bottom: 20px; }
    .fields { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; }
    .field { background: var(--gray-bg); border-radius: 10px; padding: 12px 14px; }
    .field-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 4px; }
    .field-value { font-size: 18px; font-weight: 700; }
    .field.tip-amount { grid-column: 1 / -1; background: var(--green-light); border: 1.5px solid #b2dfca; }
    .field.tip-amount .field-value { font-size: 28px; color: var(--green-dark); }
    .field.pay-period { grid-column: 1 / -1; }
    .field.pay-period .field-value { font-size: 14px; }
    .map-label-section { border-top: 1.5px solid var(--gray-border); padding-top: 18px; }
    .map-label-header { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 10px; }
    #copyBtn { width: 100%; background: var(--green); color: #fff; border: none; border-radius: 10px; padding: 18px; font-size: 22px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: background 0.15s, transform 0.08s; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
    #copyBtn:active { background: var(--green-dark); transform: scale(0.97); }
    #copyBtn.copied { background: #2ecc71; }
    footer { margin-top: 36px; font-size: 12px; color: #bbb; text-align: center; }
  </style>
</head>

    <div class="map-label-section">

      <button id="copyBtn" onclick="copyLabel()">
        <span id="copyIcon">📋</span>
        <span id="copyText">—</span>
      </button>
    </div>
  </div>

    const INDEX = {};
    for (const t of TIPS) INDEX[t.o] = t;
    let mapLabelValue = '';
    function fmtDate(iso) {
      if (!iso) return '—';
      const [y,m,d] = iso.split('-').map(Number);
      const mo = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      return mo[m-1]+' '+d+', '+y;
    }
    function lookup() {
      const oid = document.getElementById('orderInput').value.trim().replace(/^#/,'');
      if (!oid) { setStatus('Enter an order number first.', true); return; }
      const t = INDEX[oid];
      if (!t) { setStatus('Order #'+oid+' not found. Check the number and try again.', true); document.getElementById('resultCard').classList.remove('visible'); return; }
      document.getElementById('resOrderId').textContent  = '#'+oid;
      document.getElementById('resTip').textContent      = '$'+t.a.toFixed(2);
      document.getElementById('resDelivered').textContent = t.d ? fmtDate(t.d) : '—';
      document.getElementById('resTipPaid').textContent  = fmtDate(t.tp);
      document.getElementById('resPayPeriod').textContent = t.pp;
      const label = '$'+Math.round(t.a);
      document.getElementById('copyText').textContent = label;
      mapLabelValue = label;
      document.getElementById('copyBtn').classList.remove('copied');
      document.getElementById('copyIcon').textContent = '📋';
      document.getElementById('resultCard').classList.add('visible');
      document.getElementById('resultCard').scrollIntoView({behavior:'smooth',block:'nearest'});
      setStatus('', false);
    }
    async function copyLabel() {
      if (!mapLabelValue || mapLabelValue==='—') return;
      try { await navigator.clipboard.writeText(mapLabelValue); }
      catch { const ta=document.createElement('textarea'); ta.value=mapLabelValue; ta.style.cssText='position:fixed;opacity:0'; document.body.appendChild(ta); ta.focus(); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); }
      document.getElementById('copyBtn').classList.add('copied');
      document.getElementById('copyIcon').textContent = '✅';
    }
    function setStatus(msg,isError) { const el=document.getElementById('status'); el.textContent=msg; el.className=isError?'error':''; }
    document.getElementById('orderInput').addEventListener('keydown', e=>{ if(e.key==='Enter') lookup(); });
    if (window.innerWidth>600) document.getElementById('orderInput').focus();
